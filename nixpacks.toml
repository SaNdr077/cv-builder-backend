[variables]
PLAYWRIGHT_BROWSERS_PATH = "/app/pw-browsers"

[phases.setup]
nixPkgs = [
  "python311",
  "playwright-driver",
  "pango",
  "cairo",
  "glib",
  "nss",
  "nspr",
  "atk",
  "dbus",
  "libdrm",
  "mesa",
  "libxkbcommon"
]

[phases.build]
cmds = [
  "pip install -r requirements.txt",
  "python -m playwright install chromium"
]

[start]
cmd = "python manage.py collectstatic --noinput && gunicorn core.wsgi"