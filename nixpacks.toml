PLAYWRIGHT_BROWSERS_PATH = "/app/pw-browsers"

[phases.setup]
nixPkgs = ["python311", "playwright-driver", "playwright"]


[phases.build]
cmds = [
    "pip install -r requirements.txt",
    "python -m playwright install --with-deps chromium"
]

[start]
cmd = "python manage.py collectstatic --noinput && gunicorn core.wsgi"